<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f23; color: #e0e0e0; }

  .tabs {
    display: flex;

<script>
const networks = [];
let currentTab = 0;

const COLORS = {
  entry:    { bg: '#6c5ce7', border: '#341f97', font: '#fff' },
  core:     { bg: '#0984e3', border: '#0652DD', font: '#fff' },
  route:    { bg: '#00b894', border: '#00a876', font: '#fff' },
  util:     { bg: '#fdcb6e', border: '#e17055', font: '#333' },
  cron:     { bg: '#e17055', border: '#d63031', font: '#fff' },
  lambda:   { bg: '#a29bfe', border: '#6c5ce7', font: '#333' },
  frontend: { bg: '#55efc4', border: '#00b894', font: '#333' },
  script:   { bg: '#dfe6e9', border: '#b2bec3', font: '#333' },
  trigger:  { bg: '#fd79a8', border: '#e84393', font: '#fff' },
  process:  { bg: '#0984e3', border: '#0652DD', font: '#fff' },
  page:     { bg: '#81ecec', border: '#00cec9', font: '#333' },
  api:      { bg: '#74b9ff', border: '#0984e3', font: '#333' },
  db:       { bg: '#636e72', border: '#2d3436', font: '#fff' },
  external: { bg: '#fab1a0', border: '#e17055', font: '#333' },
};

function makeNode(id, label, group, extra = {}) {
  const c = COLORS[group] || COLORS.util;
  return {
    id, label,
    shape: extra.shape || 'box',
    color: { background: c.bg, border: c.border, highlight: { background: c.bg, border: '#fff' } },
    font: { color: c.font, size: extra.fontSize || 13, face: 'Segoe UI' },
    margin: extra.margin || 10,
    shadow: true,
    level: extra.level,
  };
}

function makeEdge(from, to, label = '', dashes = false) {
  return {
    from, to, label,
    arrows: 'to',
    color: { color: '#555', highlight: '#74b9ff', opacity: 0.7 },
    font: { color: '#888', size: 10, strokeWidth: 0 },
    dashes,
    smooth: { type: 'cubicBezier', roundness: 0.3 },
  };
}

const defaultOptions = {
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant: -80, centralGravity: 0.008, springLength: 160, springConstant: 0.04 },
    stabilization: { iterations: 200 },
  },
  interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true },
  layout: { improvedLayout: true },
};

// Draw group boxes around related nodes
function drawGroupBoxes(network, ctx, groups) {
  groups.forEach(group => {
    const positions = network.getPositions(group.nodeIds);
    const posArray = Object.values(positions);
    if (posArray.length === 0) return;

    // Get bounding box of all nodes in group
    const nodeSize = 35; // approximate half-size of node
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    posArray.forEach(p => {
      minX = Math.min(minX, p.x - nodeSize * 2);
      maxX = Math.max(maxX, p.x + nodeSize * 2);
      minY = Math.min(minY, p.y - nodeSize);
      maxY = Math.max(maxY, p.y + nodeSize);
    });

    const pad = 25;
    const titleHeight = 22;
    const x = minX - pad;
    const y = minY - pad - titleHeight;
    const w = maxX - minX + pad * 2;
    const h = maxY - minY + pad * 2 + titleHeight;

    // Draw background
    ctx.save();
    ctx.fillStyle = group.bgColor || 'rgba(9, 132, 227, 0.08)';
    ctx.strokeStyle = group.borderColor || 'rgba(9, 132, 227, 0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);

    // Rounded rect
    const r = 10;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Title
    ctx.setLineDash([]);
    ctx.fillStyle = group.titleColor || 'rgba(116, 185, 255, 0.9)';
    ctx.font = 'bold 14px Segoe UI';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(group.title, x + 12, y + 6);

    // Source file label
    if (group.source) {
      ctx.fillStyle = 'rgba(150, 150, 150, 0.6)';
      ctx.font = '11px Segoe UI';
      ctx.textAlign = 'right';
      ctx.fillText(group.source, x + w - 12, y + 7);
    }

    ctx.restore();
  });
}

// ===== TAB 0: Cron Flow (with group boxes) =====

    // Step 3: Find pending
    makeNode('find', 'fetchPending\nStreams()', 'process', { level: 7 }),

    // Polling: time correction safety net
    makeNode('time_fix', '時間修正\nscheduledStartTime', 'process', { level: 7 }),

    // Polling: live status check
    makeNode('live_det', 'getLiveDetails()\nisEnded?', 'process', { level: 8 }),

    // Step 4: Parse setlist (group: parseSetlistForStream)
    makeNode('get_songs', 'getSonglist\nData()', 'util', { level: 8 }),
    makeNode('get_cmt', 'getVideo\nComments()', 'util', { level: 9 }),
    makeNode('find_cmt', 'findSetlist\nComment()', 'util', { level: 10 }),
    makeNode('fuzzy', 'fuzzyMatch\nSetlist()', 'util', { level: 11 }),
    makeNode('lambda', 'Lambda matcher\nHTTP POST', 'lambda', { level: 12 }),

    // Step 5: Insert setlists & notify setlist comment
    makeNode('setlist_cmt', 'sendSetlist\nComment()', 'cron', { level: 13 }),
    makeNode('insert_set', 'processAndInsert\nSetlists()', 'process', { level: 13 }),

    // Step 6: Detect debuts
    makeNode('detect', 'detectDebut\nSongs()', 'process', { level: 14 }),

    // Step 7: Notify
    makeNode('notify', 'sendDiscord\nNotification()', 'cron', { level: 15 }),
  ]);

  const edges = new vis.DataSet([
    // runAutoUpdate main flow (Cron path)
    makeEdge('cron_daily', 'renew'),
    makeEdge('renew', 'fetch_new'),
    makeEdge('fetch_new', 'fetch_detail'),
    makeEdge('fetch_detail', 'categorize'),
    makeEdge('categorize', 'insert_s'),
    makeEdge('insert_s', 'save_tb'),
    makeEdge('save_tb', 'find'),
    makeEdge('find', 'get_songs'),
    makeEdge('get_songs', 'get_cmt'),
    makeEdge('get_cmt', 'find_cmt'),
    makeEdge('find_cmt', 'fuzzy'),
    makeEdge('fuzzy', 'lambda'),
    makeEdge('lambda', 'setlist_cmt', '解析完成'),
    makeEdge('lambda', 'insert_set', '回傳結果'),
    makeEdge('insert_set', 'detect'),
    makeEdge('detect', 'notify'),

    // PubSub path: single video
    makeEdge('pubsub', 'get_info', '單一影片'),
    makeEdge('get_info', 'categorize'),

    // runPollingCheck flow
    makeEdge('cron_poll', 'find'),
    makeEdge('find', 'time_fix', 'Polling'),
    makeEdge('time_fix', 'live_det'),
    makeEdge('live_det', 'get_songs', '已結束'),

    // Manual trigger
    makeEdge('manual', 'fetch_new', '', true),
  ]);

  return { nodes, edges };
}

    borderColor: 'rgba(9, 132, 227, 0.4)',

// ===== Tab Switching =====
function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach((t, i) => t.classList.toggle('active', i === idx));
  currentTab = idx;

  if (!networks[idx]) {
    const builders = [buildGraph0, buildGraph1, buildGraph2];
    const data = builders[idx]();
    const container = document.getElementById('graph' + idx);
    const opts = JSON.parse(JSON.stringify(defaultOptions));

    if (idx === 0) {
      opts.layout = { hierarchical: { direction: 'LR', sortMethod: 'directed', levelSeparation: 160, nodeSpacing: 90 } };
      opts.physics = false;
    }
    if (idx === 2) {
      opts.layout = { hierarchical: { direction: 'TB', sortMethod: 'directed', levelSeparation: 120, nodeSpacing: 100 } };
      opts.physics = false;
    }

    const network = new vis.Network(container, data, opts);
    networks[idx] = network;

    // Add group boxes for cron flow tab
    if (idx === 0) {
      network.on('afterDrawing', function(ctx) {
        drawGroupBoxes(network, ctx, cronGroups);
      });
      // Redraw to show boxes after stabilization
      network.once('stabilized', function() {
        network.redraw();
      });
    }
  } else {
    networks[idx].fit();
  }

  updateLegend(idx);
}

function updateLegend(idx) {
  const legends = [
    [['trigger','觸發源'],['process','處理步驟'],['util','工具函數'],['cron','通知'],['lambda','Lambda / 外部']],
    [['entry','入口層'],['core','核心應用'],['route','路由模組'],['util','工具模組'],['cron','排程任務'],['lambda','Lambda'],['frontend','前端'],['script','CLI 腳本']],
    [['trigger','使用者'],['process','路由/快取'],['page','頁面'],['api','API 呼叫'],['core','後端'],['external','靜態檔案'],['lambda','外部']],
  ];

  const el = document.getElementById('legend');
  el.innerHTML = legends[idx].map(([group, label]) => {
    const c = COLORS[group];
    return `<div class="legend-item"><div class="legend-dot" style="background:${c.bg};border:1px solid ${c.border}"></div>${label}</div>`;
  }).join('');

  // Add group box legend for cron flow
  if (idx === 0) {
    el.innerHTML += `<div class="legend-item" style="margin-top:6px;border-top:1px solid #444;padding-top:6px"><div class="legend-dot" style="background:rgba(9,132,227,0.15);border:2px dashed rgba(9,132,227,0.5)"></div>群組框 = 函數內部流程</div>`;
  }
}
