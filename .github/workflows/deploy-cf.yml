name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build fansite JS bundle
      - name: Build fansite
        working-directory: fansite
        run: |
          npm ci
          npm run build:js

      # Cache-bust：dist 資產引用加 commit hash（同 deploy.yml，兩站行為一致）
      - name: Cache-bust asset references
        run: |
          sed -i "s|/assets/dist/tool\.js[^\"]*|/assets/dist/tool.js?v=${GITHUB_SHA::8}|; s|/assets/dist/tool\.css[^\"]*|/assets/dist/tool.css?v=${GITHUB_SHA::8}|" fansite/index.html

      # Install root dependencies
      - run: npm ci

      # Deploy to Cloudflare Workers
      - run: npx wrangler deploy
