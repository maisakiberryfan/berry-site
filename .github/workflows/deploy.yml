name: Deploy to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.dev.vars'
      - 'wrangler.toml'

env:
  AWS_REGION: ap-northeast-1
  SAM_CLI_TELEMETRY: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Install dependencies and make esbuild available on PATH
      - run: |
          npm ci
          echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH

      # Build fansite JS bundle (CSS is pre-built and committed)
      - name: Build fansite
        working-directory: fansite
        run: |
          npm ci
          npm run build:js

      # Cache-bust：dist 資產引用加 commit hash。index.html 為 no-cache 每次重驗，
      # 新 hash＝新 URL → 瀏覽器立即抓新版（dist 本身 max-age=86400 的快取效益保留）
      - name: Cache-bust asset references
        run: |
          sed -i "s|/assets/dist/tool\.js[^\"]*|/assets/dist/tool.js?v=${GITHUB_SHA::8}|; s|/assets/dist/tool\.css[^\"]*|/assets/dist/tool.css?v=${GITHUB_SHA::8}|" fansite/index.html

      # Build Lambda
      - run: sam build

      # Deploy Lambda + API Gateway + CloudFront
      - run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --resolve-s3 \
            --stack-name berry-site \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DbHost=${{ secrets.DB_HOST }} \
              DbPort=${{ secrets.DB_PORT }} \
              DbUser=${{ secrets.DB_USER }} \
              DbPassword=${{ secrets.DB_PASSWORD }} \
              DbName=${{ secrets.DB_NAME }} \
              YoutubeApiKey=${{ secrets.YOUTUBE_API_KEY }} \
              AnthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
              DiscordWebhookUrl=${{ secrets.DISCORD_WEBHOOK_URL }} \
              # MIGRATED to yt-setlist-discord (2026-05-02): DiscordSetlistWebhookUrl removed
              TriggerToken=${{ secrets.TRIGGER_TOKEN }} \
              LambdaMatcherUrl=${{ secrets.LAMBDA_MATCHER_URL }} \
              PubsubCallbackUrl=${{ secrets.PUBSUB_CALLBACK_URL }} \
              GithubToken=${{ secrets.GH_PAT_TOKEN }}

      # Get S3 bucket name and CloudFront distribution ID from stack outputs
      - name: Get stack outputs
        id: stack
        run: |
          echo "bucket=$(aws cloudformation describe-stacks --stack-name berry-site --query 'Stacks[0].Outputs[?OutputKey==`FansiteBucketName`].OutputValue' --output text)" >> "$GITHUB_OUTPUT"
          echo "cf_dist=$(aws cloudformation describe-stacks --stack-name berry-site --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' --output text)" >> "$GITHUB_OUTPUT"

      # Sync fansite static files to S3
      - name: Sync fansite to S3
        run: |
          aws s3 sync fansite/ s3://${{ steps.stack.outputs.bucket }}/ \
            --delete \
            --size-only \
            --cache-control "public, max-age=86400" \
            --exclude "node_modules/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "*.scss" \
            --exclude "*.html" \
            --exclude "*.htm" \
            --exclude "*.md" \
            --exclude "nav.json" \
            --exclude "config.js" \
            --exclude "changelog.json"
          # 內容檔案用 no-cache（瀏覽器每次 revalidate，304 極快）；不用 --size-only
          # 以免同大小的內容變更被跳過（此組皆為小檔案，全量比對成本可忽略）
          aws s3 sync fansite/ s3://${{ steps.stack.outputs.bucket }}/ \
            --cache-control "no-cache, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.htm" \
            --include "*.md" \
            --include "nav.json" \
            --include "config.js" \
            --include "changelog.json" \
            --exclude "node_modules/*"

      # Invalidate CloudFront cache for updated files
      - name: Invalidate CloudFront
        run: |
          # 全路徑 invalidation：1 path/次（免費額度 1000/月），避免再有「新目錄忘了加清單」的遺漏
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.cf_dist }} \
            --paths "/*"

  # 獨立 SAM stack：歌單模糊比對 Lambda（lambda/setlist-matcher）
  # 只在 matcher 或本 workflow 變更時部署
  deploy-matcher:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect matcher changes
        id: changes
        run: |
          if git diff --quiet HEAD^ HEAD -- lambda/setlist-matcher/ .github/workflows/deploy.yml 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: '24'

      - uses: aws-actions/setup-sam@v2
        if: steps.changes.outputs.changed == 'true'

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build & deploy matcher
        if: steps.changes.outputs.changed == 'true'
        working-directory: lambda/setlist-matcher
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --resolve-s3 \
            --stack-name berry-setlist-matcher \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides BerrySiteApiUrl=https://d36w2d8blmdfr.cloudfront.net
